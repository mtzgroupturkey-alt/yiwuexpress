# ==========================================
# NGINX SSL Configuration for www.dromkok.com
# ==========================================
# This configuration:
# 1. Redirects HTTP traffic to HTTPS (SSL/TLS)
# 2. Configures secure SSL/TLS settings
# 3. Proxies requests to your Next.js application
# 4. Enables HSTS for security
# 5. Handles compression and caching

# ==========================================
# HTTP - Redirect to HTTPS
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name www.dromkok.com dromkok.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ==========================================
# HTTPS - Main Server Block
# ==========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dromkok.com dromkok.com;

    # ==========================================
    # SSL Certificate Configuration
    # ==========================================
    # Path to your SSL certificate bundle (includes CA certificates)
    ssl_certificate /etc/nginx/ssl/dromkok.com/dromkok.com_bundle.crt;
    
    # Path to your SSL private key
    ssl_certificate_key /etc/nginx/ssl/dromkok.com/dromkok.com.key;

    # ==========================================
    # SSL Protocol and Cipher Configuration
    # ==========================================
    # Use only secure TLS versions (TLS 1.2 and higher)
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Specify strong cipher suites
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Prefer server ciphers over client ciphers
    ssl_prefer_server_ciphers on;
    
    # Enable SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ==========================================
    # Security Headers
    # ==========================================
    # HTTP Strict-Transport-Security (HSTS)
    # Forces browser to use HTTPS for all future requests
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # X-Content-Type-Options - Prevents MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-Frame-Options - Prevents clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-XSS-Protection - XSS attack protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy - Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy - Control browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==========================================
    # Logging
    # ==========================================
    access_log /var/log/nginx/www.dromkok.com_access.log combined;
    error_log /var/log/nginx/www.dromkok.com_error.log warn;

    # ==========================================
    # Root Directory and Index
    # ==========================================
    root /var/www/html;
    index index.html index.htm;

    # ==========================================
    # Compression
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # ==========================================
    # Client Upload Size Limit
    # ==========================================
    client_max_body_size 100M;

    # ==========================================
    # Timeouts
    # ==========================================
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ==========================================
    # Proxy Configuration for Next.js Application
    # ==========================================
    location / {
        # Proxy to your Next.js application
        # Replace localhost:3000 with your actual application server address
        proxy_pass http://localhost:3000;
        
        # Forward important headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Disable buffering for real-time updates
        proxy_buffering off;
    }

    # ==========================================
    # API Routes
    # ==========================================
    location /api/ {
        proxy_pass http://localhost:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache API responses for 5 minutes if applicable
        proxy_cache_valid 200 5m;
        proxy_cache_bypass $http_pragma $http_authorization;
    }

    # ==========================================
    # Static Files - Cache Optimization
    # ==========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        
        # Cache static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        access_log off;
    }

    # ==========================================
    # Deny Access to Sensitive Files
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.well-known/acme-challenge {
        allow all;
    }

    # ==========================================
    # Favicon and Robots
    # ==========================================
    location = /favicon.ico {
        proxy_pass http://localhost:3000;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://localhost:3000;
        access_log off;
    }
}

