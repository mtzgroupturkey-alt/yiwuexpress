<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- YIWU EXPRESS Logo -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c" />
      <stop offset="100%" stop-color="#102a43" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#a0843e" />
    </linearGradient>
  </defs>
  
  <!-- Container -->
  <rect x="0" y="0" width="200" height="60" rx="8" fill="white" stroke="url(#primaryGradient)" stroke-width="2"/>
  
  <!-- Shipping Symbol -->
  <path d="M30 30 L40 20 L50 30 L45 40 L35 40 Z" fill="url(#goldGradient)" stroke="#1a3a5c" stroke-width="1"/>
  <circle cx="30" cy="30" r="3" fill="#e74c3c"/>
  <circle cx="50" cy="30" r="3" fill="#e74c3c"/>
  <path d="M30 30 L50 30" stroke="#1a3a5c" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Logo Text -->
  <text x="70" y="30" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#1a3a5c">
    YIWU EXPRESS
  </text>
  
  <!-- Tagline -->
  <text x="70" y="45" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#666">
    Global Trade Solutions from Yiwu, China
  </text>
  
  <!-- Decorative Chinese pattern elements -->
  <path d="M10 15 L15 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <path d="M190 15 L185 10" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <path d="M10 45 L15 50" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <path d="M190 45 L185 50" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
</svg>