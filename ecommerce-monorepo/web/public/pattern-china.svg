<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="chinese-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Traditional Chinese cloud pattern -->
      <path d="M 20 30 Q 30 20, 40 30 T 60 30 Q 70 40, 60 50 T 40 50 Q 30 40, 20 30 Z" 
            fill="currentColor" opacity="0.15"/>
      
      <!-- Diamond/lattice pattern -->
      <path d="M 50 10 L 60 20 L 50 30 L 40 20 Z" 
            fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      
      <!-- Circular coin motif -->
      <circle cx="80" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <circle cx="80" cy="20" r="4" fill="currentColor" opacity="0.1"/>
      
      <!-- Small decorative dots -->
      <circle cx="15" cy="15" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="85" cy="85" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="15" cy="85" r="2" fill="currentColor" opacity="0.2"/>
      <circle cx="85" cy="15" r="2" fill="currentColor" opacity="0.2"/>
      
      <!-- Wave pattern (simplified) -->
      <path d="M 10 70 Q 20 65, 30 70 T 50 70 Q 60 75, 70 70 T 90 70" 
            fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>
      
      <!-- Another cloud -->
      <path d="M 70 60 Q 75 55, 80 60 T 90 60 Q 95 65, 90 70 T 80 70 Q 75 65, 70 60 Z" 
            fill="currentColor" opacity="0.1"/>
      
      <!-- Bamboo-inspired lines -->
      <line x1="25" y1="50" x2="25" y2="90" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
      <line x1="30" y1="55" x2="30" y2="85" stroke="currentColor" stroke-width="1" opacity="0.12"/>
    </pattern>
  </defs>
  
  <rect width="200" height="200" fill="url(#chinese-pattern)"/>
</svg>
